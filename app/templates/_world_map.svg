<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <rect width="1000" height="500" fill="var(--color-card)"/>

  <!-- Simplified, stylized continent silhouettes placed within their real
       equirectangular bounding boxes (lon -180..180 -> x 0..1000,
       lat 90..-90 -> y 0..500). Shapes are illustrative, not survey-accurate,
       but each continent sits in its correct geographic box so pins plotted
       from real lon/lat land on the right landmass. -->
  <g fill="var(--color-secondary)" stroke="var(--color-border)" stroke-width="1">

    <!-- North America: x 28-361, y 42-208 -->
    <path d="M60,55 L160,42 L260,55 L330,80 L355,120 L335,150
             L350,180 L310,205 L260,200 L220,208 L170,195
             L120,205 L80,180 L55,140 L65,95 Z"/>

    <!-- South America: x 264-403, y 214-403 -->
    <path d="M300,218 L350,214 L385,250 L400,300 L390,350
             L370,395 L335,403 L300,385 L285,330 L280,270 Z"/>

    <!-- Europe: x 472-611, y 56-153 -->
    <path d="M480,60 L540,56 L600,70 L611,100 L590,125
             L600,145 L555,153 L515,140 L490,110 L478,80 Z"/>

    <!-- Africa: x 444-639, y 147-347 -->
    <path d="M480,150 L560,147 L610,170 L639,220 L625,280
             L600,330 L560,347 L520,335 L495,290 L470,230
             L460,190 Z"/>

    <!-- Asia: x 611-917, y 42-236 -->
    <path d="M615,80 L700,42 L800,50 L880,75 L917,110
             L900,150 L910,190 L860,220 L800,236 L740,215
             L690,225 L650,190 L620,150 L611,110 Z"/>

    <!-- Australia: x 814-928, y 278-372 -->
    <path d="M820,290 L880,278 L928,300 L920,345 L870,372
             L825,360 L814,320 Z"/>

  </g>

  <!-- subtle latitude/longitude grid -->
  <g stroke="var(--color-border)" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="125" x2="1000" y2="125"/>
    <line x1="0" y1="250" x2="1000" y2="250"/>
    <line x1="0" y1="375" x2="1000" y2="375"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>
</svg>
